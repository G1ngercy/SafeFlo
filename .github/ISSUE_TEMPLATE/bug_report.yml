name: Bug report
description: Сообщить о проблеме в SafeFlo
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что нашли время сообщить о баге!

        **Если вы обнаружили проблему безопасности — НЕ открывайте публичный issue.**
        Используйте приватный security advisory: см. SECURITY.md.

  - type: textarea
    id: what-happened
    attributes:
      label: Что произошло?
      description: Опишите проблему. Что вы ожидали, что произошло вместо этого.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Шаги воспроизведения
      description: |
        Минимальный набор шагов, чтобы воспроизвести проблему.
        Идеально — короткий код или последовательность команд.
      placeholder: |
        1. Клонирую репозиторий
        2. Запускаю `npm install` и `npm run build`
        3. Запускаю `node dist/cli.js init`
        4. Вижу ошибку: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Версия SafeFlo
      description: Из `package.json` или вывода `safeflow --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Версия Node.js
      placeholder: "22.5.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: ОС
      options:
        - Linux
        - macOS
        - Windows
        - Другое
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Логи и stack trace
      description: |
        Полный вывод ошибки. Не забудьте удалить любые секреты/токены, если они там есть.
      render: shell
